name: CARLA Simulation CI

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  carla-smoke-test:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute CARLA smoke test on self-hosted GPU runner
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x run_carla_test.sh
          ./run_carla_test.sh test_carla.py
